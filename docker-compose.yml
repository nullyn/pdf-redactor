version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - ALLOWED_ORIGINS=*
      - DEBUG=True
      - LOG_LEVEL=INFO
    volumes:
      - /tmp/pdf_redaction:/tmp/pdf_redaction
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: python -m http.server 3000
    ports:
      - "3000:3000"
    depends_on:
      - backend
