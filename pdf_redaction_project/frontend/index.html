<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Redaction Tool</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        :root {
            --color-primary: #2185d0;
            --color-primary-dark: #1678c2;
            --color-danger: #c41e3a;
            --color-success: #2ecc40;
            --color-bg: #f5f5f5;
            --color-card: #ffffff;
            --color-text: #333333;
            --color-text-light: #666666;
            --color-border: #e0e0e0;
            --color-overlay: rgba(0, 0, 0, 0.5);
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
            --radius: 8px;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 8px 16px rgba(0, 0, 0, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--color-bg);
            color: var(--color-text);
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: var(--spacing-lg);
        }

        header {
            background: white;
            padding: var(--spacing-lg);
            margin-bottom: var(--spacing-lg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        h1 {
            font-size: 28px;
            margin-bottom: var(--spacing-xs);
            color: var(--color-primary);
        }

        .subtitle {
            color: var(--color-text-light);
            font-size: 14px;
        }

        /* Layout */
        .main-layout {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: var(--spacing-lg);
        }

        .pdf-viewer-section {
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .pdf-controls {
            padding: var(--spacing-md);
            border-bottom: 1px solid var(--color-border);
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            background: #f9f9f9;
        }

        .pdf-canvas-container {
            flex: 1;
            overflow: auto;
            padding: var(--spacing-md);
            background: #e8e8e8;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #pdfCanvas {
            max-width: 100%;
            max-height: 100%;
            background: white;
            box-shadow: var(--shadow-lg);
        }

        .canvas-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .redaction-box {
            position: absolute;
            border: 2px solid #ff4444;
            background: rgba(255, 68, 68, 0.1);
            cursor: pointer;
            transition: all 0.2s;
        }

        .redaction-box:hover {
            background: rgba(255, 68, 68, 0.2);
            border-color: #cc0000;
        }

        .redaction-box.selected {
            background: rgba(255, 68, 68, 0.3);
            border-color: #cc0000;
            border-width: 3px;
        }

        /* Sidebar */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-lg);
        }

        .card {
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: var(--spacing-md);
        }

        .card h3 {
            margin-bottom: var(--spacing-md);
            font-size: 16px;
            color: var(--color-primary);
        }

        /* Upload */
        .upload-area {
            border: 2px dashed var(--color-border);
            border-radius: var(--radius);
            padding: var(--spacing-lg);
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #f9f9f9;
        }

        .upload-area:hover {
            border-color: var(--color-primary);
            background: #f0f7ff;
        }

        .upload-area.dragover {
            border-color: var(--color-primary);
            background: #f0f7ff;
        }

        .upload-icon {
            font-size: 32px;
            margin-bottom: var(--spacing-sm);
        }

        input[type="file"] {
            display: none;
        }

        /* Buttons */
        button {
            padding: 10px 16px;
            border: none;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .btn-primary {
            background: var(--color-primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--color-primary-dark);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-danger {
            background: var(--color-danger);
            color: white;
        }

        .btn-danger:hover {
            background: #b01a33;
        }

        .btn-success {
            background: var(--color-success);
            color: white;
        }

        .btn-secondary {
            background: white;
            color: var(--color-primary);
            border: 1px solid var(--color-border);
        }

        .btn-secondary:hover {
            background: var(--color-bg);
        }

        /* Entity List */
        .entity-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .entity-item {
            padding: var(--spacing-sm);
            border-bottom: 1px solid var(--color-border);
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: all 0.2s;
        }

        .entity-item:hover {
            background: #f9f9f9;
        }

        .entity-item.selected {
            background: #e3f2fd;
            border-left-color: var(--color-primary);
        }

        .entity-item input[type="checkbox"] {
            margin-right: var(--spacing-sm);
        }

        .entity-text {
            font-size: 13px;
            color: var(--color-text);
            display: inline;
        }

        .entity-type {
            display: inline-block;
            font-size: 11px;
            padding: 2px 6px;
            background: var(--color-bg);
            border-radius: 3px;
            margin-left: 4px;
            font-weight: 600;
        }

        /* Status & Summary */
        .status-box {
            padding: var(--spacing-md);
            background: #f0f7ff;
            border-left: 4px solid var(--color-primary);
            border-radius: 4px;
            font-size: 13px;
        }

        .status-box.error {
            background: #ffebee;
            border-left-color: var(--color-danger);
        }

        .status-box.success {
            background: #f1f8e9;
            border-left-color: var(--color-success);
        }

        /* Loading */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid var(--color-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: var(--color-overlay);
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            padding: var(--spacing-lg);
            border-radius: var(--radius);
            max-width: 500px;
            width: 90%;
            box-shadow: var(--shadow-lg);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .main-layout {
                grid-template-columns: 1fr;
            }

            .sidebar {
                flex-direction: row;
                flex-wrap: wrap;
            }

            .card {
                flex: 1;
                min-width: 250px;
            }
        }

        .hidden {
            display: none !important;
        }

        .flex {
            display: flex;
        }

        .flex-center {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .flex-col {
            flex-direction: column;
        }

        .gap-sm {
            gap: var(--spacing-sm);
        }

        .gap-md {
            gap: var(--spacing-md);
        }

        .mb-md {
            margin-bottom: var(--spacing-md);
        }

        .text-center {
            text-align: center;
        }

        .text-sm {
            font-size: 13px;
        }

        .text-muted {
            color: var(--color-text-light);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📄 PDF Redaction Tool</h1>
            <p class="subtitle">Remove sensitive information from PDFs with ease</p>
        </header>

        <div class="main-layout">
            <!-- PDF Viewer -->
            <div class="pdf-viewer-section">
                <div class="pdf-controls flex gap-md">
                    <div class="flex gap-sm flex-center">
                        <button class="btn-secondary" id="prevBtn" disabled>← Previous</button>
                        <input type="number" id="pageNum" min="1" max="1" value="1" style="width: 60px; padding: 8px; border: 1px solid var(--color-border); border-radius: 4px;">
                        <span class="text-sm text-muted">/ <span id="pageCount">0</span></span>
                        <button class="btn-secondary" id="nextBtn" disabled>Next →</button>
                    </div>
                    <span id="loadingSpinner" class="spinner hidden"></span>
                </div>

                <div class="pdf-canvas-container">
                    <canvas id="pdfCanvas"></canvas>
                    <div class="canvas-overlay" id="overlayContainer"></div>
                </div>
            </div>

            <!-- Sidebar -->
            <div class="sidebar">
                <!-- Upload -->
                <div class="card">
                    <h3>📤 Upload PDF</h3>
                    <div class="upload-area" id="uploadArea">
                        <div class="upload-icon">📁</div>
                        <p class="text-sm"><strong>Click to upload</strong> or drag and drop</p>
                        <p class="text-sm text-muted">PDF files only (Max 50MB)</p>
                    </div>
                    <input type="file" id="fileInput" accept=".pdf">
                </div>

                <!-- Detection -->
                <div class="card">
                    <h3>🔍 Detection</h3>
                    <button class="btn-primary" id="detectBtn" style="width: 100%;" disabled>
                        Detect PII
                    </button>
                    <div id="detectionStatus" class="status-box hidden mb-md"></div>
                </div>

                <!-- Summary -->
                <div class="card hidden" id="summaryCard">
                    <h3>📊 Found Entities</h3>
                    <div id="entitySummary" class="text-sm"></div>
                </div>

                <!-- Entity List -->
                <div class="card hidden" id="entityListCard">
                    <h3>🎯 Review & Select</h3>
                    <div class="entity-list" id="entityList"></div>
                    <div style="display: flex; gap: var(--spacing-sm); margin-top: var(--spacing-md);">
                        <button class="btn-secondary" id="selectAllBtn" style="flex: 1; font-size: 12px;">Select All</button>
                        <button class="btn-secondary" id="deselectAllBtn" style="flex: 1; font-size: 12px;">Deselect All</button>
                    </div>
                </div>

                <!-- Actions -->
                <div class="card hidden" id="actionsCard">
                    <button class="btn-danger" id="applyBtn" style="width: 100%; margin-bottom: var(--spacing-sm);">
                        ✓ Apply Redactions
                    </button>
                    <button class="btn-secondary" id="downloadBtn" style="width: 100%;" disabled>
                        ⬇️ Download PDF
                    </button>
                    <button class="btn-secondary" id="resetBtn" style="width: 100%; margin-top: var(--spacing-sm);">
                        🔄 Start Over
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal" id="confirmModal">
        <div class="modal-content">
            <h3 style="margin-bottom: var(--spacing-md);">Confirm Redaction</h3>
            <p id="confirmMessage" class="mb-md"></p>
            <div style="display: flex; gap: var(--spacing-md);">
                <button class="btn-secondary" id="cancelBtn" style="flex: 1;">Cancel</button>
                <button class="btn-danger" id="confirmBtn" style="flex: 1;">Apply</button>
            </div>
        </div>
    </div>

    <script>
        // API Configuration
        const API_BASE = 'http://localhost:8000/api';
        const DEBUG = true; // Set to true for detailed logging

        // Debug function
        function debug(message, data = null) {
            if (DEBUG) {
                console.log(`[PDF Redaction] ${message}`, data || '');
            }
        }

        // State
        let state = {
            fileId: null,
            pdf: null,
            pageCount: 0,
            currentPage: 1,
            matches: [],
            selectedMatches: new Set(),
            redactedFileId: null,
        };

        // PDF.js setup
        if (typeof pdfjsLib === 'undefined') {
            console.error('PDF.js library not loaded! Check CDN link.');
            alert('PDF.js library failed to load. Check your internet connection.');
        } else {
            debug('PDF.js loaded, version:', pdfjsLib.version);
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
            debug('PDF.js worker source set');
        }

        // Test API connectivity on page load
        window.addEventListener('load', async () => {
            try {
                const response = await fetch(`${API_BASE}/health`);
                if (response.ok) {
                    const data = await response.json();
                    debug('Backend API is connected:', data);
                } else {
                    console.warn('Backend health check failed:', response.status);
                    alert(`⚠️ Backend API returned status ${response.status}. Make sure the backend is running on port 8000.`);
                }
            } catch (error) {
                console.error('Backend connection error:', error.message);
                alert(`❌ Cannot connect to backend at ${API_BASE}\n\nMake sure:\n1. Backend is running on http://localhost:8000\n2. You have CORS enabled\n3. Check browser console for details`);
            }
        });

        // DOM Elements
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const detectBtn = document.getElementById('detectBtn');
        const pdfCanvas = document.getElementById('pdfCanvas');
        const overlayContainer = document.getElementById('overlayContainer');
        const pageNum = document.getElementById('pageNum');
        const pageCount = document.getElementById('pageCount');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const entityList = document.getElementById('entityList');
        const entityListCard = document.getElementById('entityListCard');
        const summaryCard = document.getElementById('summaryCard');
        const actionsCard = document.getElementById('actionsCard');
        const applyBtn = document.getElementById('applyBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const resetBtn = document.getElementById('resetBtn');
        const selectAllBtn = document.getElementById('selectAllBtn');
        const deselectAllBtn = document.getElementById('deselectAllBtn');
        const detectionStatus = document.getElementById('detectionStatus');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const confirmModal = document.getElementById('confirmModal');
        const confirmBtn = document.getElementById('confirmBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const confirmMessage = document.getElementById('confirmMessage');

        // Event Listeners
        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files[0]) {
                fileInput.files = e.dataTransfer.files;
                handleFileUpload(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) {
                handleFileUpload(e.target.files[0]);
            }
        });

        detectBtn.addEventListener('click', detectPII);
        applyBtn.addEventListener('click', showConfirmModal);
        confirmBtn.addEventListener('click', applyRedactions);
        cancelBtn.addEventListener('click', () => confirmModal.classList.remove('active'));
        downloadBtn.addEventListener('click', downloadRedactedPDF);
        resetBtn.addEventListener('click', resetApp);
        selectAllBtn.addEventListener('click', selectAllEntities);
        deselectAllBtn.addEventListener('click', deselectAllEntities);
        pageNum.addEventListener('change', (e) => goToPage(parseInt(e.target.value)));
        prevBtn.addEventListener('click', () => goToPage(state.currentPage - 1));
        nextBtn.addEventListener('click', () => goToPage(state.currentPage + 1));

        // File Upload Handler
        async function handleFileUpload(file) {
            // Validate file
            if (!file.name.endsWith('.pdf')) {
                showStatus('❌ Error: Please select a PDF file only', 'error');
                return;
            }

            if (file.size > 50 * 1024 * 1024) {
                showStatus('❌ Error: File is too large (max 50MB)', 'error');
                return;
            }

            const formData = new FormData();
            formData.append('file', file);

            try {
                showLoading(true);
                detectBtn.disabled = true;
                showStatus('Uploading PDF...', 'info');

                debug('Uploading file:', file.name, 'size:', file.size);

                const response = await fetch(`${API_BASE}/upload`, {
                    method: 'POST',
                    body: formData,
                });

                debug('Upload response status:', response.status);

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`Upload failed (${response.status}): ${errorText}`);
                }

                const data = await response.json();
                debug('Upload successful:', data);

                state.fileId = data.file_id;
                state.pageCount = data.page_count;

                // Load PDF for preview
                showStatus('Loading PDF preview...', 'info');
                await loadPDF(file);

                // Update UI
                detectBtn.disabled = false;
                detectBtn.textContent = 'Detect PII';
                showStatus('✓ PDF uploaded successfully! Click "Detect PII" to scan for sensitive information.', 'success');
            } catch (error) {
                console.error('Upload error:', error);
                showStatus(`❌ Error: ${error.message}`, 'error');
                detectBtn.disabled = true;
            } finally {
                showLoading(false);
            }
        }

        // Load PDF for preview
        async function loadPDF(file) {
            try {
                debug('Loading PDF:', file.name);
                const arrayBuffer = await file.arrayBuffer();
                debug('PDF array buffer created, size:', arrayBuffer.byteLength);

                state.pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
                debug('PDF document loaded, pages:', state.pdf.numPages);

                state.pageCount = state.pdf.numPages;
                pageCount.textContent = state.pageCount;
                pageNum.max = state.pageCount;
                goToPage(1);
            } catch (error) {
                console.error('PDF load error:', error);
                showStatus(`Failed to load PDF: ${error.message}`, 'error');
                throw error;
            }
        }

        // Render PDF page
        async function renderPage(pageNumber) {
            try {
                if (!state.pdf) {
                    console.warn('No PDF loaded');
                    return;
                }

                debug(`Rendering page ${pageNumber}/${state.pageCount}`);
                const page = await state.pdf.getPage(pageNumber);
                const scale = 2;
                const viewport = page.getViewport({ scale });

                // Ensure canvas exists and has proper context
                if (!pdfCanvas) {
                    throw new Error('Canvas element not found');
                }

                pdfCanvas.width = viewport.width;
                pdfCanvas.height = viewport.height;

                const context = pdfCanvas.getContext('2d', { willReadFrequently: true });
                if (!context) {
                    throw new Error('Could not get canvas 2D context');
                }

                // Clear canvas first
                context.clearRect(0, 0, pdfCanvas.width, pdfCanvas.height);
                context.fillStyle = 'white';
                context.fillRect(0, 0, pdfCanvas.width, pdfCanvas.height);

                debug('Rendering to canvas:', pdfCanvas.width, 'x', pdfCanvas.height);
                await page.render({ canvasContext: context, viewport }).promise;
                debug('Page rendered successfully');

                // Draw overlays for current page
                drawOverlays(pageNumber);
            } catch (error) {
                console.error('Page render error:', error);
                showStatus(`Failed to render page: ${error.message}`, 'error');
            }
        }

        // Draw entity overlays
        function drawOverlays(pageNumber) {
            overlayContainer.innerHTML = '';

            const pageMatches = state.matches.filter(m => m.page === pageNumber - 1);
            const canvasRect = pdfCanvas.getBoundingClientRect();
            const containerRect = pdfCanvas.parentElement.getBoundingClientRect();

            pageMatches.forEach((match, index) => {
                const [x0, y0, x1, y1] = match.rect;

                // Scale coordinates to canvas display size
                const scaleX = canvasRect.width / pdfCanvas.width;
                const scaleY = canvasRect.height / pdfCanvas.height;

                const box = document.createElement('div');
                box.className = 'redaction-box';
                if (state.selectedMatches.has(index)) {
                    box.classList.add('selected');
                }

                box.style.left = (x0 * scaleX) + 'px';
                box.style.top = (y0 * scaleY) + 'px';
                box.style.width = ((x1 - x0) * scaleX) + 'px';
                box.style.height = ((y1 - y0) * scaleY) + 'px';

                box.title = `${match.type}\n${match.text}`;

                box.addEventListener('click', () => toggleEntitySelection(index, box));

                overlayContainer.appendChild(box);
            });
        }

        // PII Detection
        async function detectPII() {
            if (!state.fileId) return;

            try {
                showLoading(true);
                detectBtn.disabled = true;
                detectBtn.innerHTML = '<span class="spinner"></span> Detecting...';

                const response = await fetch(`${API_BASE}/detect?file_id=${state.fileId}`, {
                    method: 'POST',
                });

                if (!response.ok) {
                    throw new Error(`Detection failed: ${response.statusText}`);
                }

                const data = await response.json();
                state.matches = data.matches;
                state.selectedMatches.clear();

                // Show results
                showEntityList(data);
                showStatus(`Found ${data.matches.length} sensitive entities across ${data.page_count} pages.`, 'success');

                // Update UI
                entityListCard.classList.remove('hidden');
                summaryCard.classList.remove('hidden');
                actionsCard.classList.remove('hidden');
            } catch (error) {
                showStatus(`Error: ${error.message}`, 'error');
            } finally {
                showLoading(false);
                detectBtn.disabled = false;
                detectBtn.textContent = 'Detect PII';
            }
        }

        // Show entity list
        function showEntityList(data) {
            entityList.innerHTML = '';

            // Group by type
            const grouped = {};
            data.matches.forEach((m, i) => {
                if (!grouped[m.type]) grouped[m.type] = [];
                grouped[m.type].push({ ...m, index: i });
            });

            Object.entries(grouped).forEach(([type, items]) => {
                items.forEach(({ index, text, type: entityType }) => {
                    const div = document.createElement('div');
                    div.className = 'entity-item';
                    div.innerHTML = `
                        <input type="checkbox" id="entity-${index}">
                        <label for="entity-${index}" style="cursor: pointer; user-select: none;">
                            <span class="entity-text">${escapeHtml(text.substring(0, 40))}</span>
                            <span class="entity-type">${entityType}</span>
                        </label>
                    `;

                    div.querySelector('input').addEventListener('change', (e) => {
                        if (e.target.checked) {
                            state.selectedMatches.add(index);
                        } else {
                            state.selectedMatches.delete(index);
                        }
                        renderPage(state.currentPage);
                    });

                    entityList.appendChild(div);
                });
            });

            // Update summary
            document.getElementById('entitySummary').innerHTML = Object.entries(data.summary)
                .map(([type, count]) => `<div><strong>${type}:</strong> ${count}</div>`)
                .join('');
        }

        // Toggle entity selection
        function toggleEntitySelection(index, boxElement) {
            if (state.selectedMatches.has(index)) {
                state.selectedMatches.delete(index);
            } else {
                state.selectedMatches.add(index);
            }
            renderPage(state.currentPage);
        }

        // Select all entities
        function selectAllEntities() {
            state.matches.forEach((_, i) => state.selectedMatches.add(i));
            entityList.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = true);
            renderPage(state.currentPage);
        }

        // Deselect all entities
        function deselectAllEntities() {
            state.selectedMatches.clear();
            entityList.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
            renderPage(state.currentPage);
        }

        // Show confirmation modal
        function showConfirmModal() {
            const count = state.selectedMatches.size;
            confirmMessage.textContent = `You have selected ${count} sensitive item${count !== 1 ? 's' : ''} to redact. This action cannot be undone. Continue?`;
            confirmModal.classList.add('active');
        }

        // Apply redactions
        async function applyRedactions() {
            confirmModal.classList.remove('active');

            if (state.selectedMatches.size === 0) {
                showStatus('Please select at least one item to redact.', 'error');
                return;
            }

            try {
                showLoading(true);
                applyBtn.disabled = true;
                applyBtn.innerHTML = '<span class="spinner"></span> Applying...';

                const redactions = Array.from(state.selectedMatches).map(index => state.matches[index]);

                const response = await fetch(`${API_BASE}/apply`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        file_id: state.fileId,
                        redactions: redactions.map(r => ({
                            page: r.page,
                            rect: r.rect,
                            type: r.type,
                            text: r.text,
                        })),
                    }),
                });

                if (!response.ok) {
                    throw new Error(`Redaction failed: ${response.statusText}`);
                }

                const data = await response.json();
                state.redactedFileId = data.file_id;
                downloadBtn.disabled = false;

                showStatus(`Successfully applied ${data.redaction_count} redactions! Download your file below.`, 'success');
            } catch (error) {
                showStatus(`Error: ${error.message}`, 'error');
            } finally {
                showLoading(false);
                applyBtn.disabled = false;
                applyBtn.textContent = '✓ Apply Redactions';
            }
        }

        // Download redacted PDF
        function downloadRedactedPDF() {
            const link = document.createElement('a');
            link.href = `${API_BASE}/download/${state.fileId}`;
            link.download = `redacted_${state.fileId.substring(0, 8)}.pdf`;
            link.click();
        }

        // Navigation
        function goToPage(pageNumber) {
            const num = Math.max(1, Math.min(pageNumber, state.pageCount));
            state.currentPage = num;
            pageNum.value = num;
            renderPage(num);
            prevBtn.disabled = num === 1;
            nextBtn.disabled = num === state.pageCount;
        }

        // UI Helpers
        function showLoading(show) {
            loadingSpinner.classList.toggle('hidden', !show);
        }

        function showStatus(message, type = 'info') {
            detectionStatus.textContent = message;
            detectionStatus.className = `status-box ${type === 'error' ? 'error' : type === 'success' ? 'success' : ''}`;
            detectionStatus.classList.remove('hidden');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Reset
        function resetApp() {
            state = {
                fileId: null,
                pdf: null,
                pageCount: 0,
                currentPage: 1,
                matches: [],
                selectedMatches: new Set(),
                redactedFileId: null,
            };

            fileInput.value = '';
            detectBtn.disabled = true;
            downloadBtn.disabled = true;
            entityListCard.classList.add('hidden');
            summaryCard.classList.add('hidden');
            actionsCard.classList.add('hidden');
            detectionStatus.classList.add('hidden');
            pdfCanvas.getContext('2d').clearRect(0, 0, pdfCanvas.width, pdfCanvas.height);
            overlayContainer.innerHTML = '';
        }
    </script>
</body>
</html>
